# Play default config
play.application.loader = "loader.AppLoader"

play.http.router = "router.Routes"

# Disable auto-loading modules; we will wire dependencies manually later
play.modules.enabled = []

play.http.secret.key = ${?PLAY_HTTP_SECRET_KEY}

# Allowed hosts filter (set in prod). If unset, Play defaults apply.
play.filters.hosts.allowed = ${?PLAY_ALLOWED_HOST[]}

db.default.driver = "org.h2.Driver"
db.default.driver = ${?BLOG_DB_DRIVER}
db.default.url = "jdbc:h2:file:./play/data/blog;MODE=PostgreSQL"
db.default.url = ${?BLOG_DB_URL}

scalikejdbc.global.loggingSQLAndTime.enabled = false

# Security headers (CSP with nonce support)
play.filters.csp.nonce.enabled = true
play.filters.csp.directives = {
  default-src = "'self'"
  script-src = "'self' https://platform.twitter.com " ${play.filters.csp.nonce.pattern}
  frame-src = "'self' https://platform.twitter.com https://syndication.twitter.com"
  style-src = "'self' 'unsafe-inline'"
  img-src = "'self' data: https:"
  connect-src = "'self'"
}

# Blog
blog.datetime.format = "yyyy/MM/dd HH:mm"
