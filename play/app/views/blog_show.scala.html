@(post: controllers.BlogItem)

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@if(post.title.nonEmpty) { @post.title } else { Untitled }</title>
    <link rel="stylesheet" href="@routes.Assets.versioned("stylesheets/main.css")" />
  </head>
  <body>
    <div class="container">
      <p><a class="back-link" href="@routes.BlogListController.list()">Back</a></p>
      <header class="header">
        <div class="brand">
          @if(post.isDraft) {
            <i class="draft draft--lg" aria-label="Draft" title="Draft"></i>
          }
          @if(post.title.nonEmpty) { @post.title } else { (untitled) }
        </div>
        <div class="subtitle">@post.displayDate</div>
      </header>
      <section class="card post-body">
        @post.body
      </section>
    </div>
    <script src="@routes.Assets.versioned("lib/mermaid/dist/mermaid.min.js")"></script>
    <script>
      if (window.mermaid) {
        window.mermaid.initialize({ startOnLoad: true });
      }
    </script>
  </body>
</html>
