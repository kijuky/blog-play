@(items: Seq[controllers.BlogListViewItem])

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog List</title>
    <link rel="stylesheet" href="@routes.Assets.versioned("stylesheets/main.css")" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="brand">Blog Viewer</div>
        <div class="subtitle">Latest first</div>
      </header>

      <section class="card">
        <ul class="post-list">
      @for(item <- items) {
          <li class="post-item">
            <a class="post-title" href="@routes.BlogShowController.show(item.id)">
              @if(item.isDraft) {
                <i class="draft" aria-label="Draft" title="Draft"></i>
              }
              <span class="post-title-text">
                @if(item.title.nonEmpty) { @item.title } else { (untitled) }
              </span>
            </a>
            <span class="post-date">@item.displayDate</span>
          </li>
      }
        </ul>
      </section>
    </div>
  </body>
</html>
